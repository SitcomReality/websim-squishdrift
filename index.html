<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Getaway Tantrum Assault</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="app-header" role="banner">
    <h1>Getaway Tantrum Assault</h1>
    <div class="right">
      <button id="toggle-debug" class="ghost" aria-pressed="false">Debug</button>
      <span aria-live="polite" class="mono" id="zoom-indicator"></span>
    </div>
  </header>

  <main class="app-main" role="main">
    <canvas id="game" width="1280" height="720" aria-label="Game canvas"></canvas>
    <div id="hud" class="hud" aria-live="polite" aria-atomic="true">
      <div class="row">
        <span class="label">Health</span>
        <div class="bar"><div id="hp-bar" class="fill" style="width:100%"></div></div>
      </div>
      <div class="row"><span class="label">Item</span><span id="item-name">None</span></div>
      <div class="row"><span class="label">Vehicle</span><span id="vehicle-state">On foot</span></div>
    </div>
    <div id="interaction-prompt" class="interaction-prompt" style="display: none;">
      Press <kbd>E</kbd> to <span id="interaction-action">...</span>
    </div>
    <div id="wasted-overlay" class="wasted-overlay" style="display: none;">
      <h1>WASTED</h1>
      <button id="restart-button">Restart</button>
    </div>
    <pre id="debug" class="debug" hidden></pre>
  </main>

  <footer class="app-footer" role="contentinfo">
    <small>Foundations per DESIGN.md — Canvas renderer, fixed timestep, input, camera follow.</small>
  </footer>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./main.js"></script>
  <script>
    // Global debug state for click handling
    window.debugState = {
      enabled: false,
      spawnMode: 'pedestrian' // 'pedestrian' or 'vehicle'
    };
  </script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
