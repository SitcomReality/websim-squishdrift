<html lang="en">
<head>
  <!-- ...existing content... -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prototype Sandbox</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <script type="importmap">

<body>
  <!-- ...existing content... -->
  <header class="app-header" role="banner">
    <div class="brand">
      <span class="dot" aria-hidden="true"></span>
      <h1>Prototype Sandbox</h1>
    </div>
    <nav aria-label="Utility">
      <button id="toggle-dev" class="ghost" aria-expanded="false" aria-controls="dev-panel">Dev</button>
    </nav>
  </header>

  <main id="app" class="app-shell" role="main" tabindex="-1">
    <section class="panel">
      <div class="panel-header">
        <h2>Items</h2>
        <div class="actions">
          <input id="new-item-input" type="text" placeholder="Add a quick note…" aria-label="New item text" />
          <button id="add-item" class="primary">Add</button>
        </div>
      </div>
      <ul id="items" class="list" aria-live="polite"></ul>
    </section>
  </main>

  <aside id="dev-panel" class="dev-panel" hidden>
    <div class="dev-row">
      <span class="label">Build:</span>
      <span id="build-id" class="mono"></span>
    </div>
    <div class="dev-row">
      <span class="label">Items:</span>
      <span id="item-count" class="mono">0</span>
    </div>
    <div class="dev-row">
      <button id="export-state" class="ghost">Export State</button>
      <button id="reset-state" class="ghost danger">Reset</button>
    </div>
    <pre id="state-dump" class="dump" aria-live="polite"></pre>
  </aside>

  <footer class="app-footer" role="contentinfo">
    <small>Read DESIGN.md for product context. This is a scaffold to iterate quickly.</small>
  </footer>

  <script type="module" src="./main.js"></script>
