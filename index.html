<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Top-down 2.5D Action Prototype</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="app-header" role="banner">
    <h1>City Prototype</h1>
    <div class="right">
      <button id="toggle-debug" class="ghost" aria-pressed="false">Debug</button>
      <span aria-live="polite" class="mono" id="zoom-indicator"></span>
    </div>
  </header>

  <main class="app-main" role="main">
    <canvas id="game" width="1280" height="720" aria-label="Game canvas"></canvas>
    <div id="hud" class="hud" aria-live="polite" aria-atomic="true">
      <div class="row">
        <span class="label">Health</span>
        <div class="bar"><div id="hp-bar" class="fill" style="width:100%"></div></div>
      </div>
      <div class="row"><span class="label">Item</span><span id="item-name">None</span></div>
      <div class="row"><span class="label">Vehicle</span><span id="vehicle-state">On foot</span></div>
    </div>
    <pre id="debug" class="debug" hidden></pre>
  </main>

  <footer class="app-footer" role="contentinfo">
    <small>Foundations per DESIGN.md — Canvas renderer, fixed timestep, input, camera follow.</small>
  </footer>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./main.js"></script>
  <script>
    // Global debug state for click handling
    window.debugState = {
      enabled: false,
      spawnMode: 'pedestrian' // 'pedestrian' or 'vehicle'
    };
  </script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/vcd15cbe7772f49c399c6a5babf22c1241717689176015" integrity="sha512-ZpsOmlRQV6y907TI0dKBHq9Md29nnaEIPlkf84rnaERnq6zvWvPUqr2ft8M1aS28oN72PdrCzSjY4U6VaAw1EQ==" data-cf-beacon='{"rayId":"9e71981d6fe7d319","version":"2025.9.1","serverTiming":{"name":{"cfExtPri":true,"cfEdge":true,"cfOrigin":true,"cfL4":true,"cfSpeedBrain":true,"cfCacheStatus":true}},"token":"4c6229722a6346bc8eb5cb0e5eae5d41","b":1}' crossorigin="anonymous"></script>
</body>
</html>
